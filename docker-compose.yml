services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: monitoring
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: monitoring
      DB_USER: admin
      DB_PASSWORD: secret
    networks:
      - app-network
    restart: unless-stopped
    command: >
      sh -c "sleep 10 &&
             python app.py"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: